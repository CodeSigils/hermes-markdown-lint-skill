# rumdl configuration — GitHub Flavored Markdown
# Imported from .markdownlint.json and manually tuned.
# rumdl: https://github.com/rvben/rumdl

[global]
# Rules disabled to match markdownlint-cli2 defaults for GFM prose
disable = [
    "MD013",  # line-length — too strict for prose docs
    "MD024",  # multiple-headings — allow h2 reuse in different sections
    "MD033",  # inline-html — rarely needed in GFM docs
    "MD034",  # bare-urls — disable; auto-linking works without brackets
    "MD036",  # no-bare-urls — alias of MD034
    "MD040",  # fenced-code-language — ``` is fine without a language
    "MD041",  # first-line-heading — frontmatter makes this noisy
    "MD052",  # no-bare-reference-link — too strict for typical prose
]

[MD003]
style = "atx"

[MD004]
style = "dash"

[MD007]
indent = 2

[MD009]
br-spaces = 2

[MD010]
spaces-per-tab = 4

[MD012]
maximum = 1

[MD026]
punctuation = ".,;:!"

[MD029]
style = "ordered"

[MD030]
ol-multi = 2
ol-single = 2
ul-multi = 3
ul-single = 3

[MD035]
style = "---"

[MD046]
style = "fenced"


