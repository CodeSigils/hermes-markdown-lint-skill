name: Test

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run tests
        run: node test/fix-tables.test.js
      - name: Lint kitchensink
        run: npx markdownlint-cli2@latest --config skills/markdown-lint/references/.markdownlint.json test/kitchensink.md
