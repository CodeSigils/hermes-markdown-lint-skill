name: Test

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run unit tests
        run: node test/format-tables.test.js
      - name: Check code fences
        run: node lint.js --fences .
      - name: Validate table columns
        run: node lint.js --validate .
      - name: Lint kitchensink fixture
        run: node lint.js --check test/kitchensink.md
      - name: Lint documentation
        run: node lint.js --check README.md skills/markdown-lint/SKILL.md AGENTS.md
